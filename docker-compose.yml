version: '3.8'

services:
  bridge-app:
    # Dockerfileмқҙ мһҲлҠ” кІҪлЎң м§Җм •
    build:
      context: ./src/BridgeApp
      dockerfile: Dockerfile
    container_name: rs485-bridge
    restart: unless-stopped

    # нҷҳкІҪ ліҖмҲҳ мЈјмһ… (C# мҪ”л“ңк°Җ мқҙ к°’мқ„ мқҪм–ҙм„ң нҸ¬нҠёлҘј м—ҪлӢҲлӢӨ)
    environment:
      - SERIAL_PORT=/dev/ttyUSB0

    # вҡ пёҸ лҰ¬лҲ…мҠӨ нҷҳкІҪ н•„мҲҳ: нҳёмҠӨнҠёмқҳ USBлҘј м»Ён…Ңмқҙл„Ҳ м•ҲмңјлЎң нҢЁмҠӨмҠӨлЈЁ
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"

    # мһҘм№ҳ м ‘к·ј к¶Ңн•ң л¶Җм—¬
    privileged: true
