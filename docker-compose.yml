version: '3.8'

services:
  # 🌟 Tailscale 서비스: Headscale에 자동 조인 수행
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-bridge
    hostname: ${BRIDGE_NAME} # Headscale에 등록될 이름
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--login-server ${HEADSCALE_URL} --reset
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ts-data:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: always

  bridge-app:
    container_name: rs485-bridge
    build:
      context: .
      dockerfile: ./src/BridgeApp/Dockerfile
    restart: always
    # 🌟 중요: 앱 컨테이너가 테일스케일 네트워크를 공유하게 함
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/fb1:/dev/fb1"
    privileged: true
    environment:
      - BRIDGE_NAME=${BRIDGE_NAME}
      - MAINFRAME_URL=${MAINFRAME_URL}
      - DOTNET_ENVIRONMENT=Production

volumes:
  ts-data: # 테일스케일 로그인 상태 유지용
